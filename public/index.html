<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Review Insight - AI Sentiment Analyzer</title>
    <link rel="stylesheet" href="style.css">
    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <header>
            <h1>Review Insight</h1>
            <p>당신의 문장에 담긴 감성을 AI가 분석해 드립니다.</p>
        </header>

        <main class="input-section">
            <textarea id="inputText" placeholder="분석하고 싶은 문장을 입력해 주세요... (예: 서비스가 너무 친절해서 감동받았어요!)"></textarea>
            <button id="analyzeBtn">
                <span class="spinner" id="btnSpinner"></span>
                <span id="btnText">감성 분석 시작</span>
            </button>
        </main>
    </div>

    <!-- 결과 모달 -->
    <div class="modal-overlay" id="resultModal">
        <div class="modal-content">
            <div class="sentiment-icon" id="sentimentIcon">✨</div>
            <h2 class="sentiment-result" id="sentimentText">분석 완료</h2>
            
            <p>분석 신뢰도: <span id="confidenceValue">0</span>%</p>
            <div class="confidence-bar">
                <div class="confidence-fill" id="confidenceBar"></div>
            </div>

            <p class="reason-text" id="reasonText">
                분석 결과를 불러오는 중입니다...
            </p>

            <button class="close-btn" id="closeModalBtn">확인</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
